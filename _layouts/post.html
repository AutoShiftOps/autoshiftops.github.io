---
layout: default
---
<header class="page-hero">
  <div class="wrap">
    <div class="eyebrow">post</div>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      {{ page.date | date: "%B %d, %Y" }}
      {% if page.tags %} &middot; {{ page.tags | join: " / " }}{% endif %}
    </div>
  </div>
</header>
<section>
  <div class="wrap prose">
    {{ content }}
  </div>
</section>
