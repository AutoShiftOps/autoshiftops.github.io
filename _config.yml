title: AutoShiftOps
tagline: Application Architect building AI-powered DevOps tooling
description: >-
  Sajja — Application Architect with 13+ years across cloud infrastructure,
  DevOps, and AI-powered operations. Creator of QueryTuner.
url: "https://autoshiftops.com"
baseurl: ""

author:
  name: Sajja
  email: sajja.sudhakararao@gmail.com
  location: "Mississauga, Ontario"

# Social / external links
social:
  github_org: "https://github.com/AutoShiftOps"
  linkedin: "https://www.linkedin.com/in/sajjasudhakararao"
  youtube: "https://youtube.com/@sajjasudhakararao"
  querytuner: "https://querytuner.com"
  devto: "https://dev.to/sajjasudhakararao"
  medium: "https://medium.com/@sajjasudhakarrao"
  dzone: "https://dzone.com/users/5524033/sajjasudhakararao.html"
  patreon: "https://www.patreon.com/cw/Autoshiftops"
  substack: "https://sajjas.substack.com/"

# Repos to hide from the live-fetched "GitHub Repositories" homepage section.
# Names are case-insensitive and must match the GitHub repo name exactly.
github_repos_exclude:
  - abandoned-selves
  - sajja-command-center

# Collections / blog
permalink: /blog/:year/:month/:day/:title/
markdown: kramdown
highlighter: rouge

include:
  - _pages
  - teaching-python/tests
  - teaching-python/manifest.json

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Ensure posts output
collections:
  posts:
    output: true

# Search settings (search.json is generated but no search UI currently wired up)
search:
  json_path: /search.json

exclude:
  - README.md
  - README-START-HERE.md
  - BLOGGING-WORKFLOW.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - _pre-redesign-2026-07
  - autoshiftops-site.zip
